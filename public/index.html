<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>readffs.</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="header-top">
        <div>
          <h1>readffs.</h1>
          <p class="subtitle">save pages for later</p>
        </div>
        <button id="anti-paywall-toggle" class="toggle-btn" title="Replace medium.com with freedium-mirror.cfd">
          <span class="toggle-switch"></span>
          <span class="toggle-label">anti-paywall</span>
        </button>
      </div>
    </header>

    <form id="download-form" class="capture-row">
      <input 
        type="url" 
        id="url-input" 
        placeholder="https://example.com/article" 
        required
        autocomplete="off"
      >
      <button type="submit" id="submit-btn">
        <span class="btn-text">Save</span>
      </button>
    </form>

    <section class="history-section">
      <div class="history-header">
        <h2>Library</h2>
        <span id="history-count">0 items</span>
      </div>
      
      <ul id="history-list" class="history-list"></ul>
      <p id="empty-msg" class="empty-msg" style="display: none;">Nothing saved yet.</p>
      
      <div id="pagination" class="pagination" style="display: none;">
        <button type="button" id="prev-page" class="page-btn">&larr;</button>
        <span id="page-info" class="page-info">1 / 1</span>
        <button type="button" id="next-page" class="page-btn">&rarr;</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
