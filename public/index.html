<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>readffs.</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Background Texture Hint -->
    <div class="bg-pattern"></div>

    <main class="container">
      <div class="layout-grid">
        <!-- Left Column: Form Section -->
        <div class="left-panel">
          <header>
            <h1>read<span class="text-dim">ffs.</span></h1>
            <h2>
              a minimal tool for capturing web articles. convert your urls into
              <span class="highlight">clean pdfs</span>
              instantly.
            </h2>
          </header>

          <form id="download-form" class="capture-form">
            <div class="input-group">
              <label>article url</label>
              <input
                type="url"
                id="url-input"
                placeholder="e.g. https://example.com/article"
                required
                autocomplete="off"
              />
            </div>

            <div class="form-actions">
              <div style="display: flex; gap: 16px; align-items: center">
                <select
                  id="theme-select"
                  class="theme-dropdown"
                  title="Select PDF Theme"
                >
                  <option value="light" selected>light pdf</option>
                  <option value="dark">dark pdf</option>
                </select>

                <!-- Toggle logic relies on #anti-paywall-toggle classList.toggle('active') -->
                <button
                  type="button"
                  id="anti-paywall-toggle"
                  class="custom-toggle"
                  title="Prepend freedium-mirror.cfd/ to medium.com"
                >
                  <span class="checkbox">
                    <svg
                      class="check-icon"
                      width="12"
                      height="12"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="3"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </span>
                  <span class="toggle-text">anti-paywall</span>
                </button>
              </div>

              <button type="submit" id="submit-btn">
                <span class="btn-text">save</span>
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="send-icon"
                >
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </form>
        </div>

        <!-- Right Column: Results Section -->
        <div class="right-panel">
          <section class="history-section">
            <div class="history-header">
              <div class="history-title">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"
                  ></path>
                </svg>
                <span>library.</span>
              </div>
              <span id="history-count">0 articles</span>
            </div>

            <div class="history-list-wrapper">
              <ul id="history-list" class="history-list"></ul>
              <p id="empty-msg" class="empty-msg" style="display: none">
                No articles captured yet.
              </p>
            </div>

            <div id="pagination" class="pagination" style="display: none">
              <button type="button" id="prev-page" class="page-btn">
                &larr;
              </button>
              <span id="page-info" class="page-info">1 / 1</span>
              <button type="button" id="next-page" class="page-btn">
                &rarr;
              </button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
