<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>readffs.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="container">
    <header>
      <div class="header-top">
        <div>
          <h1>readffs<span class="cursor">_</span></h1>
          <p class="subtitle">save pages for later</p>
        </div>
        <button id="anti-paywall-toggle" class="toggle-btn" title="Replace medium.com with freedium-mirror.cfd">
          <span class="toggle-label">anti-paywall</span>
          <span class="toggle-switch"></span>
        </button>
      </div>
    </header>

    <form id="download-form" class="panel">
      <div class="panel-head">
        <span>new capture</span>
        <span class="dot"></span>
      </div>
      <div class="input-group">
        <input 
          type="url" 
          id="url-input" 
          placeholder="https://example.com/article" 
          required
          autocomplete="off"
        >
        <label for="url-input" class="input-label">url</label>
      </div>

      <div class="input-group">
        <input 
          type="text" 
          id="filename-input" 
          placeholder="optional filename"
          autocomplete="off"
        >
        <label for="filename-input" class="input-label">filename</label>
      </div>

      <button type="submit" id="submit-btn">
        <span class="btn-text">save</span>
        <span class="btn-loader"></span>
      </button>
    </form>

    <section class="history-section panel">
      <div class="panel-head">
        <span>library</span>
        <span id="history-count">0 items</span>
      </div>
      <h2>saved</h2>
      <ul id="history-list" class="history-list"></ul>
      <p id="empty-msg" class="empty-msg">nothing saved yet</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
